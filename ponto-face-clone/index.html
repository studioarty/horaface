<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PontoFace</title>
  </head>
  <body>
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-64 bg-surface/80 backdrop-blur-2xl border-r border-white/5 z-50 transform -translate-x-full transition-transform duration-300 md:translate-x-0">
      <div class="flex items-center justify-between h-16 px-4 border-b border-white/5">
        <span class="text-xl font-display font-bold text-primary">PontoFace</span>
        <button id="closeSidebar" class="md:hidden text-muted hover:text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
      <nav class="p-4 space-y-2">
        <a href="#" class="flex items-center px-4 py-3 text-white bg-white/5 rounded-lg border border-primary/20" id="nav-dashboard">
          <svg class="w-5 h-5 mr-3 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
          Painel
        </a>
        <a href="#" class="flex items-center px-4 py-3 text-muted hover:text-white hover:bg-white/5 rounded-lg transition-colors border border-transparent" id="nav-ponto">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
          Ponto Eletrônico
        </a>
        <a href="#" class="flex items-center px-4 py-3 text-muted hover:text-white hover:bg-white/5 rounded-lg transition-colors border border-transparent" id="nav-prestadores">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
          Prestadores
        </a>
      </nav>
      <div class="absolute bottom-0 w-full p-4 border-t border-white/5">
        <a href="#" class="flex items-center px-4 py-3 text-danger hover:bg-white/5 rounded-lg transition-colors">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          Sair
        </a>
      </div>
    </aside>

    <!-- Main Content wrapper -->
    <div class="md:ml-64 min-h-screen flex flex-col transition-all duration-300">
      
      <!-- Top header (Mobile Menu Toggle & Global Status) -->
      <header class="h-16 flex items-center justify-between px-4 sm:px-8 relative z-10 w-full max-w-7xl mx-auto">
        <button id="openSidebar" class="md:hidden glass-panel p-2 text-white hover:text-primary transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="hidden md:block"></div> <!-- Spacer -->
        <div class="glass-panel px-4 py-1.5 flex items-center gap-2">
           <span class="text-xs font-mono text-muted uppercase tracking-wider">Sistema</span>
           <span class="w-2 h-2 rounded-full bg-success shadow-[0_0_8px_theme('colors.success')]"></span>
           <span class="text-xs font-mono text-success font-bold uppercase tracking-wider">Online</span>
        </div>
      </header>

      <!-- Dynamic View Container -->
      <main id="app" class="flex-grow p-4 sm:p-8 w-full max-w-7xl mx-auto"></main>

    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
